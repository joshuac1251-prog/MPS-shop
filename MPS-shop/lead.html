<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Form</title>
<link rel="stylesheet" href="css/style.css">

<!-- Meta Pixel base code -->
<script>
!function(f,b,e,v,n,t,s){
if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];
t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)
}(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');
fbq('init', 'YOUR_PIXEL_ID'); 
fbq('track', 'PageView');
</script>
</head>
<body>

<button class="top-back" onclick="history.back()">&lt;</button>

<h1>Sign Up for Offers</h1>

<!-- Lead Form -->
<form id="leadForm" method="POST" action="https://script.google.com/macros/s/AKfycbxZyTI8ieTo-i071wHELI3Zsc7FNr4CY3yAinOTRLqFXUQcLT9SCU9Ais97qmQmVtMk/exec">
  <label for="name">Name:</label>
  <input type="text" name="name" required>

  <label for="email">Email:</label>
  <input type="email" name="email" required>

  <button type="submit">Submit</button>
</form>


<script>
document.getElementById('leadForm').addEventListener('submit', function() {
  fbq('track', 'Lead'); // Meta Pixel event
});
</script>

</body>
</html>
