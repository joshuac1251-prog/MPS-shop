<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - Meta Test Shop</title>
  <!-- Meta Pixel Code -->
<script>
!function(f,b,e,v,n,t,s)
{if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)}(window, document,'script',
'https://connect.facebook.net/en_US/fbevents.js');
fbq('init', '3821742341430033');
fbq('track', 'PageView');
</script>

<!-- Custom Event AFTER Pixel is loaded -->
<noscript><img height="1" width="1" style="display:none"
src="https://www.facebook.com/tr?id=3821742341430033&ev=PageView&noscript=1"
/></noscript>
</head>
<body>
<h1>Checkout</h1>
<ul id="cart-items"></ul>
<button onclick="purchase()">Purchase</button>
<script>
const cartItems = JSON.parse(localStorage.getItem('cart') || '[]');
const list = document.getElementById('cart-items');
cartItems.forEach(item => {
  const li = document.createElement('li');
  li.textContent = item.name + ' - ' + item.price + ' MYR';
  list.appendChild(li);
});

function purchase() {
  const totalValue = cartItems.reduce((sum, item) => sum + item.price, 0);
  fbq('track', 'Purchase', {value: totalValue, currency:'MYR'});
  localStorage.removeItem('cart');
  alert('Purchase completed!');
  window.location.href = 'thankyou.html';
}
</script>
</body>
</html>
